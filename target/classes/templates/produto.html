<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Produto - ToyStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            color: #1f2937;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.12), transparent 22%),
                radial-gradient(circle at top right, rgba(168,85,247,0.10), transparent 20%),
                linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
            min-height: 100vh;
        }

        .nav-futuristic {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.15);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.08);
        }

        .nav-glow-line {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #60a5fa, #8b5cf6, #ec4899, #f59e0b, #60a5fa);
            background-size: 300% 100%;
            animation: glowMove 8s linear infinite;
            opacity: 0.95;
        }

        @keyframes glowMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .floating-orb {
            position: absolute;
            border-radius: 9999px;
            filter: blur(10px);
            opacity: 0.45;
            pointer-events: none;
            animation: floatOrb 6s ease-in-out infinite;
        }

        .orb-1 {
            width: 80px;
            height: 80px;
            top: -18px;
            left: 12%;
            background: rgba(96, 165, 250, 0.22);
        }

        .orb-2 {
            width: 64px;
            height: 64px;
            top: 6px;
            right: 18%;
            background: rgba(236, 72, 153, 0.18);
            animation-delay: 1.2s;
        }

        .orb-3 {
            width: 52px;
            height: 52px;
            top: 18px;
            right: 30%;
            background: rgba(168, 85, 247, 0.18);
            animation-delay: 2s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(8px) translateX(6px); }
        }

        .logo-shell {
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.7), 0 10px 30px rgba(99, 102, 241, 0.35);
        }

        .logo-shell::after {
            content: "";
            position: absolute;
            inset: -30%;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.65) 50%, transparent 70%);
            transform: rotate(20deg);
            animation: shineLogo 3.5s linear infinite;
        }

        @keyframes shineLogo {
            0% { transform: translateX(-140%) rotate(20deg); }
            100% { transform: translateX(140%) rotate(20deg); }
        }

        .brand-title {
            letter-spacing: 0.3px;
            text-shadow: 0 4px 18px rgba(99, 102, 241, 0.15);
        }

        .menu-pill {
            position: relative;
            padding: 10px 16px;
            border-radius: 9999px;
            transition: all 0.28s ease;
            text-decoration: none;
        }

        .menu-pill:hover {
            background: linear-gradient(135deg, rgba(96,165,250,0.12), rgba(168,85,247,0.12));
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.10);
        }

        .menu-pill.active-link {
            color: #2563eb;
            background: linear-gradient(135deg, rgba(96,165,250,0.16), rgba(168,85,247,0.16));
            box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.18);
        }

        .menu-pill::before {
            content: "";
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 6px;
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.25s ease;
        }

        .menu-pill:hover::before,
        .menu-pill.active-link::before {
            transform: scaleX(1);
        }

        .action-icon-btn {
            position: relative;
            border-radius: 9999px;
            transition: all 0.28s ease;
        }

        .action-icon-btn:hover {
            background: linear-gradient(135deg, rgba(96,165,250,0.14), rgba(168,85,247,0.14));
            transform: translateY(-1px) scale(1.04);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.12);
        }

        .action-icon-btn::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(96,165,250,0.22), rgba(168,85,247,0.22));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
                    mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.28s ease;
        }

        .action-icon-btn:hover::after {
            opacity: 1;
        }

        .btn-login-future {
            background: rgba(255,255,255,0.55);
            border: 1px solid rgba(59,130,246,0.14);
            box-shadow: 0 8px 20px rgba(59,130,246,0.08);
        }

        .btn-login-future:hover {
            background: linear-gradient(135deg, rgba(96,165,250,0.14), rgba(168,85,247,0.14));
            color: #2563eb;
            transform: translateY(-1px);
        }

        .btn-cadastrar-future {
            background: linear-gradient(135deg, #3b82f6, #7c3aed, #ec4899);
            background-size: 200% 200%;
            animation: buttonFlow 5s ease infinite;
            box-shadow: 0 14px 28px rgba(99, 102, 241, 0.28);
        }

        .btn-cadastrar-future:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 18px 34px rgba(99, 102, 241, 0.36);
        }

        @keyframes buttonFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .page-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 38px 20px 70px;
        }

        .hero-product {
            position: relative;
            overflow: hidden;
            margin-top: 10px;
            margin-bottom: 30px;
            padding: 36px 30px;
            border-radius: 32px;
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(255,255,255,0.10), transparent 24%),
                linear-gradient(135deg, #4f46e5 0%, #7c3aed 45%, #ec4899 100%);
            color: white;
            box-shadow: 0 24px 60px rgba(76, 29, 149, 0.25);
        }

        .hero-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.24);
            backdrop-filter: blur(10px);
        }

        .hero-title {
            margin: 16px 0 10px;
            font-size: 40px;
            line-height: 1.05;
            font-weight: 900;
        }

        .hero-subtitle {
            margin: 0;
            max-width: 680px;
            font-size: 18px;
            color: #e0e7ff;
            line-height: 1.6;
        }

        .produto-box {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.82);
            border-radius: 30px;
            padding: 30px;
            display: flex;
            gap: 36px;
            box-shadow: 0 18px 40px rgba(99, 102, 241, 0.10);
            flex-wrap: wrap;
        }

        .imagem {
            flex: 1;
            min-width: 300px;
        }

        .imagem-inner {
            position: relative;
            background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
            border-radius: 28px;
            padding: 22px;
            box-shadow: 0 16px 30px rgba(0,0,0,0.05);
        }

        .imagem img {
            width: 100%;
            max-height: 520px;
            border-radius: 22px;
            object-fit: contain;
            display: block;
            background: white;
        }

        .info {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .categoria {
            background: linear-gradient(135deg, rgba(99,102,241,0.10), rgba(168,85,247,0.10));
            color: #4338ca;
            padding: 8px 14px;
            border-radius: 999px;
            display: inline-block;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 14px;
            width: fit-content;
            border: 1px solid rgba(99,102,241,0.10);
        }

        .nome {
            font-size: 38px;
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 14px;
            color: #111827;
        }

        .preco {
            font-size: 34px;
            color: #2563eb;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .descricao {
            color: #555;
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .acoes {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 14px 25px;
            border-radius: 16px;
            font-weight: 800;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.25s ease;
        }

        .btn-comprar {
            background: linear-gradient(135deg, #3b82f6, #7c3aed, #ec4899);
            color: white;
            box-shadow: 0 14px 28px rgba(99, 102, 241, 0.22);
        }

        .btn-comprar:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 18px 32px rgba(99, 102, 241, 0.28);
        }

        .btn-voltar {
            background: #eef2ff;
            color: #4338ca;
        }

        .btn-voltar:hover {
            background: #e0e7ff;
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .page-wrap {
                padding: 24px 16px 50px;
            }

            .hero-product {
                padding: 28px 20px;
                border-radius: 24px;
            }

            .hero-title {
                font-size: 30px;
            }

            .hero-subtitle {
                font-size: 15px;
            }

            .produto-box {
                flex-direction: column;
                padding: 22px;
                border-radius: 24px;
            }

            .nome {
                font-size: 30px;
            }

            .preco {
                font-size: 28px;
            }

            .imagem img {
                max-height: 380px;
            }
        }
    </style>
</head>
<body>

    <nav class="nav-futuristic">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>

        <div style="max-width:1320px; margin:0 auto; padding:0 20px; position:relative;">
            <div style="display:flex; justify-content:space-between; align-items:center; min-height:80px; gap:16px; flex-wrap:wrap;">
                <a href="/index" class="flex items-center space-x-3 group" style="text-decoration:none;">
                    <div class="logo-shell w-12 h-12 bg-gradient-to-br from-blue-500 via-violet-600 to-pink-500 rounded-2xl flex items-center justify-center transition duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i data-lucide="gamepad-2" class="w-6 h-6 text-white"></i>
                    </div>

                    <div class="leading-tight">
                        <span class="brand-title block text-3xl font-extrabold bg-gradient-to-r from-blue-600 via-violet-600 to-pink-500 bg-clip-text text-transparent">
                            ToyStore
                        </span>
                        <span class="text-xs font-bold uppercase tracking-[0.25em] text-blue-500/80">
                            diversão do futuro
                        </span>
                    </div>
                </a>

                <div class="hidden md:flex items-center justify-center flex-1">
                    <div class="flex items-center space-x-2 bg-white/55 backdrop-blur-md border border-white/60 rounded-full px-3 py-2 shadow-lg">
                        <a href="/" class="menu-pill text-gray-700 hover:text-blue-600 font-bold transition">Início</a>
                        <a href="/produto" class="menu-pill active-link font-bold transition">Produtos</a>
                        <a href="/equipe" class="menu-pill text-gray-700 hover:text-blue-600 font-bold transition">Equipe</a>
                    </div>
                </div>

				<div class="flex items-center space-x-3">

				                        <!-- NÃO LOGADO -->
				                        <div th:if="${usuarioLogado == null}" class="flex items-center space-x-3">

				                            <a href="/login"
				                               class="px-5 py-2.5 bg-white/60 backdrop-blur-md border border-white/60 text-blue-600 font-bold rounded-full shadow-md hover:bg-blue-50 transition">
				                                Entrar
				                            </a>

				                            <a href="/cadastro"
				                               class="px-5 py-2.5 bg-gradient-to-r from-blue-500 via-purple-600 to-pink-500 text-white font-extrabold rounded-full shadow-lg hover:scale-105 transition">
				                                Cadastrar
				                            </a>

				                        </div>

				                        <!-- LOGADO -->
				                        <div th:if="${usuarioLogado != null}" class="flex items-center space-x-3">

				                            <div class="px-4 py-2 bg-white/60 backdrop-blur-md border border-white/60 rounded-full shadow-md font-bold text-blue-600">
				                                👋 <span th:text="${usuarioLogado}"></span>
				                            </div>

				                            <a href="/logout"
				                               class="px-4 py-2 bg-red-100 text-red-600 font-bold rounded-full hover:bg-red-200 transition">
				                                Sair
				                            </a>

				                        </div>

				                    </div>
                    <div id="user-menu" class="hidden flex items-center space-x-3">
                        <span id="username-display" class="font-bold text-gray-700"></span>
                        <button onclick="logout()" class="p-2 text-red-600 hover:bg-red-50 rounded-full transition">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-glow-line"></div>
    </nav>

    <div class="page-wrap">
        <section class="hero-product">
            <h1 class="hero-title">Detalhes do produto</h1>
            <p class="hero-subtitle">Veja mais informações, imagem e descrição completa do brinquedo escolhido.</p>
        </section>

        <div class="produto-box">

            <div class="imagem">
                <div class="imagem-inner">
                    <img th:if="${produto.imagem != null and produto.imagem != ''}"
                         th:src="@{/uploads/{img}(img=${produto.imagem})}"
                         alt="Imagem do produto" />

                    <img th:if="${produto.imagem == null or produto.imagem == ''}"
                         src="https://via.placeholder.com/500"
                         alt="Sem imagem" />
                </div>
            </div>

            <div class="info">
                <div class="categoria" th:text="${produto.categoria}">Categoria</div>

                <div class="nome" th:text="${produto.nome}">Nome do Produto</div>

                <div class="preco">
                    R$ <span th:text="${produto.valor}">0.00</span>
                </div>

                <div class="descricao" th:text="${produto.descricao}">
                    Descrição do produto
                </div>

                <div class="acoes">
                    <a href="/produto" class="btn-action btn-voltar">Voltar</a>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        initializeData();
        updateAuthUI();
        updateCartUI();
    </script>

</body>
</html>
