<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ToyStore</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }

        .nav-futuristic {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.15);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.08);
        }

        .nav-glow-line {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #60a5fa, #8b5cf6, #ec4899, #f59e0b, #60a5fa);
            background-size: 300% 100%;
            animation: glowMove 8s linear infinite;
            opacity: 0.95;
        }

        @keyframes glowMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .logo-shell {
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.7), 0 10px 30px rgba(99, 102, 241, 0.35);
        }

        .logo-shell::after {
            content: "";
            position: absolute;
            inset: -30%;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.65) 50%, transparent 70%);
            transform: rotate(20deg);
            animation: shineLogo 3.5s linear infinite;
        }

        @keyframes shineLogo {
            0% { transform: translateX(-140%) rotate(20deg); }
            100% { transform: translateX(140%) rotate(20deg); }
        }

        .brand-title {
            letter-spacing: 0.3px;
            text-shadow: 0 4px 18px rgba(99, 102, 241, 0.15);
        }

        .menu-pill {
            position: relative;
            padding: 10px 16px;
            border-radius: 9999px;
            transition: all 0.28s ease;
        }

        .menu-pill:hover {
            background: linear-gradient(135deg, rgba(96,165,250,0.12), rgba(168,85,247,0.12));
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.10);
        }

        .menu-pill.active-link {
            color: #2563eb;
            background: linear-gradient(135deg, rgba(96,165,250,0.16), rgba(168,85,247,0.16));
            box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.18);
        }

        .menu-pill::before {
            content: "";
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 6px;
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.25s ease;
        }

        .menu-pill:hover::before,
        .menu-pill.active-link::before {
            transform: scaleX(1);
        }

        .floating-orb {
            position: absolute;
            border-radius: 9999px;
            filter: blur(10px);
            opacity: 0.45;
            pointer-events: none;
            animation: floatOrb 6s ease-in-out infinite;
        }

        .orb-1 {
            width: 80px;
            height: 80px;
            top: -18px;
            left: 12%;
            background: rgba(96, 165, 250, 0.22);
        }

        .orb-2 {
            width: 64px;
            height: 64px;
            top: 6px;
            right: 18%;
            background: rgba(236, 72, 153, 0.18);
            animation-delay: 1.2s;
        }

        .orb-3 {
            width: 52px;
            height: 52px;
            top: 18px;
            right: 30%;
            background: rgba(168, 85, 247, 0.18);
            animation-delay: 2s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(8px) translateX(6px); }
        }

        .login-bg {
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.20), transparent 28%),
                radial-gradient(circle at top right, rgba(168,85,247,0.16), transparent 25%),
                linear-gradient(135deg, #4f46e5 0%, #7c3aed 45%, #ec4899 100%);
        }

        .login-card {
            background: rgba(255,255,255,0.14);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.22);
            box-shadow: 0 25px 60px rgba(76, 29, 149, 0.30);
        }

        .login-input {
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.24);
            color: white;
            transition: all 0.25s ease;
        }

        .login-input::placeholder {
            color: rgba(255,255,255,0.70);
        }

        .login-input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.45);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.20);
        }

        .btn-user {
            background: linear-gradient(135deg, #ffffff, #eef2ff);
            color: #5b21b6;
            box-shadow: 0 14px 30px rgba(255,255,255,0.16);
        }

        .btn-user:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 18px 36px rgba(255,255,255,0.22);
        }

        .btn-admin {
            background: linear-gradient(135deg, #1d4ed8, #7c3aed, #db2777);
            color: white;
            box-shadow: 0 14px 30px rgba(76, 29, 149, 0.28);
        }

        .btn-admin:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 18px 36px rgba(76, 29, 149, 0.34);
        }

        .login-badge {
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.22);
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen">

    <!-- NAVBAR -->
    <nav class="fixed w-full z-50 nav-futuristic">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div class="flex justify-between h-20 items-center">

                <a href="/index" class="flex items-center space-x-3 group">
                    <div class="logo-shell w-12 h-12 bg-gradient-to-br from-blue-500 via-violet-600 to-pink-500 rounded-2xl flex items-center justify-center transition duration-300 group-hover:scale-110 group-hover:rotate-3">
                        <i data-lucide="gamepad-2" class="w-6 h-6 text-white"></i>
                    </div>

                    <div class="leading-tight">
                        <span class="brand-title block text-3xl font-extrabold bg-gradient-to-r from-blue-600 via-violet-600 to-pink-500 bg-clip-text text-transparent">
                            ToyStore
                        </span>
                        <span class="text-xs font-bold uppercase tracking-[0.25em] text-blue-500/80">
                            diversão do futuro
                        </span>
                    </div>
                </a>

                <div class="hidden md:flex items-center space-x-2 bg-white/55 backdrop-blur-md border border-white/60 rounded-full px-3 py-2 shadow-lg">
                    <a href="/index" class="menu-pill text-gray-700 hover:text-blue-600 font-bold transition">Início</a>
                    <a href="/produto" class="menu-pill text-gray-700 hover:text-blue-600 font-bold transition">Produtos</a>
                    <a href="/equipe" class="menu-pill text-gray-700 hover:text-blue-600 font-bold transition">Equipe</a>
                </div>

                <div class="flex items-center space-x-3">
                    <a href="/login" class="menu-pill active-link font-bold transition hidden md:block">Entrar</a>
                    <a href="/cadastro" class="px-5 py-2.5 rounded-full text-white font-extrabold transition shadow-lg bg-gradient-to-r from-blue-600 via-violet-600 to-pink-500 hover:scale-105">
                        Cadastrar
                    </a>
                </div>

            </div>
        </div>

        <div class="nav-glow-line"></div>
    </nav>

    <!-- LOGIN -->
    <section class="pt-28 pb-16 min-h-screen login-bg flex items-center justify-center relative overflow-hidden">
        <div class="absolute inset-0 opacity-20">
            <div class="absolute top-20 left-10 w-36 h-36 rounded-full bg-cyan-300 blur-3xl"></div>
            <div class="absolute top-24 right-12 w-44 h-44 rounded-full bg-pink-400 blur-3xl"></div>
            <div class="absolute bottom-10 left-1/3 w-40 h-40 rounded-full bg-violet-300 blur-3xl"></div>
        </div>

        <div class="w-full max-w-md px-4 relative z-10">
            <div class="login-card rounded-[2rem] p-8 md:p-10 text-white">

                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-white/15 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/20 shadow-xl">
                        <i data-lucide="log-in" class="w-10 h-10 text-white"></i>
                    </div>

                    <span class="login-badge inline-block px-4 py-1.5 rounded-full text-sm font-bold backdrop-blur-sm shadow-lg">
                        ✨ Acesse sua conta
                    </span>

                    <h2 class="text-3xl md:text-4xl font-extrabold mt-5">Entrar</h2>
                    <p class="text-blue-100 mt-2">Bem-vindo de volta à ToyStore</p>
                </div>

                <!-- ERRO -->
                <p th:if="${erro}" class="bg-red-500/20 border border-red-300/30 text-white text-center mb-5 font-semibold rounded-2xl px-4 py-3" th:text="${erro}"></p>

                <!-- FORM -->
                <form method="post" class="space-y-5">

                    <!-- Usuário -->
                    <div>
                        <label class="block text-sm font-bold text-white/90 mb-2">Usuário</label>
                        <div class="relative">
                            <i data-lucide="user" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-white/70"></i>
                            <input type="text" name="usuario" required
                                   class="login-input w-full pl-12 pr-4 py-3.5 rounded-2xl"
                                   placeholder="Digite seu usuário">
                        </div>
                    </div>

					<!-- Senha -->
					<div>
					    <label class="block text-sm font-bold text-white/90 mb-2">Senha</label>
					    <div class="relative">
					        <i data-lucide="lock" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-white/70"></i>

					        <input type="password" id="senhaLogin" name="senha" required
					               class="login-input w-full pl-12 pr-12 py-3.5 rounded-2xl"
					               placeholder="Digite sua senha">

					        <!-- OLHO -->
					        <i id="toggleSenhaLogin" data-lucide="eye"
					           class="w-5 h-5 absolute right-4 top-1/2 -translate-y-1/2 text-white/70 cursor-pointer"></i>
					    </div>
					</div>

                    <!-- BOTÃO USUÁRIO -->
                    <button type="submit" formaction="/login"
                            class="btn-user w-full py-3.5 font-extrabold rounded-2xl transition">
                        Entrar como Usuário
                    </button>

                    <!-- BOTÃO ADMIN -->
                    <a href="/adm_l"
                       class="btn-admin w-full block text-center py-3.5 font-extrabold rounded-2xl transition">
                        Entrar como Admin
                    </a>

                </form>

                <p class="mt-7 text-center text-blue-100">
                    Não tem conta?
                    <a href="/cadastro" class="text-white font-extrabold hover:underline">
                        Cadastre-se
                    </a>
                </p>

            </div>
        </div>
    </section>

	<script>
	    lucide.createIcons();

	    function toggleSenha(inputId, iconId) {
	        const input = document.getElementById(inputId);
	        const icon = document.getElementById(iconId);

	        if (!input || !icon) return;

	        icon.addEventListener("click", () => {
	            input.type = input.type === "password" ? "text" : "password";
	        });
	    }

	    toggleSenha("senha", "toggleSenha");
	    toggleSenha("confirmarSenha", "toggleConfirmar");
	    toggleSenha("senhaLogin", "toggleSenhaLogin");
	</script>
</body>
</html>
