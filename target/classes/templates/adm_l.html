<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ToyStore</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }

        .admin-bg {
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.20), transparent 28%),
                radial-gradient(circle at top right, rgba(168,85,247,0.16), transparent 25%),
                linear-gradient(135deg, #1e3a8a 0%, #4f46e5 45%, #7c3aed 100%);
        }

        .card {
            background: rgba(255,255,255,0.14);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        .input {
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }

        .input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6, #7c3aed, #ec4899);
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="min-h-screen admin-bg flex items-center justify-center">

    <div class="card p-10 rounded-3xl w-full max-w-md text-white">

        <!-- HEADER -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="shield" class="w-10 h-10"></i>
            </div>

            <h1 class="text-3xl font-extrabold">Administração</h1>
            <p class="text-blue-100 mt-2">Área restrita</p>
        </div>

        <!-- ERRO -->
        <div th:if="${erro}" class="bg-red-500/20 border border-red-300 text-white p-3 rounded-xl mb-4 text-center">
            <span th:text="${erro}"></span>
        </div>

        <!-- FORM -->
        <form th:action="@{/login-admin}" method="post" class="space-y-5">

            <!-- USUARIO -->
            <div>
                <label class="block text-sm font-bold mb-2">Usuário</label>
                <div class="relative">
                    <i data-lucide="user" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-white/70"></i>
                    <input type="text" name="usuario" required
                           class="input w-full pl-10 pr-4 py-3 rounded-xl"
                           placeholder="Digite o usuário">
                </div>
            </div>

            <!-- SENHA -->
            <div>
                <label class="block text-sm font-bold mb-2">Senha</label>
                <div class="relative">
                    <i data-lucide="lock" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-white/70"></i>
                    <input type="password" name="senha" required
                           class="input w-full pl-10 pr-4 py-3 rounded-xl"
                           placeholder="Digite a senha">
                </div>
            </div>

            <!-- BOTÃO -->
            <button type="submit"
                    class="btn w-full py-3 font-extrabold rounded-xl transition shadow-lg">
                Acessar Painel
            </button>

        </form>

        <!-- VOLTAR -->
        <a href="/index" class="block text-center mt-6 text-blue-100 hover:text-white transition">
            ← Voltar para a loja
        </a>

    </div>

    <script>
        lucide.createIcons();
    </script>

</body>
</html>
